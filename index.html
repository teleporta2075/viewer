<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Viewer</title>
  <style>
    body { margin:0; overflow:hidden; background:#ffffff; }

    #info {
      position:absolute;
      top:10px;
      left:10px;
      color:white;
      background:rgba(0,0,0,0.75);
      padding:8px 10px;
      font-family:Arial, sans-serif;
      font-size:12px;
      border-radius:8px;
      z-index:10;
      max-height:80vh;
      max-width:360px;
      overflow:auto;
      white-space:pre-wrap;
    }
  </style>
</head>

<body>

<div id="info">Загрузка...</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>
const info = document.getElementById("info");

const params = new URLSearchParams(window.location.search);
const modelUrl = params.get("model") || "model.glb";
const targetName = (params.get("name") || "").toLowerCase().trim();

const scene = new THREE.Scene();
scene.background = new THREE.Color(0xffffff);

const camera = new THREE.PerspectiveCamera(
  60,
  window.innerWidth / window.innerHeight,
  0.1,
  5000
);

const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(1);
renderer.powerPreference = "high-performance";
document.body.appendChild(renderer.domElement);

const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;

scene.add(new THREE.AmbientLight(0xffffff, 1.6));

const light1 = new THREE.DirectionalLight(0xffffff, 2.2);
light1.position.set(10, 10, 10);
scene.add(light1);

const light2 = new THREE.DirectionalLight(0xffffff, 1.5);
light2.position.set(-10, 5, -10);
scene.add(light2);


// 🔥 чистим имена
function isValidName(n){
  if(!n) return false;
  const s = n.toLowerCase();
  return !(
    s.includes("geom") ||
    s.includes("mesh") ||
    s.includes("node") ||
    s.includes("scene") ||
    s.includes("object")
  );
}

function cleanName(n){
  return n.replace(/[_]+/g, " ").trim();
}


// 🔥 ФИКСИРОВАННАЯ КАМЕРА (15 м)
function fitToBox(box, close){
  const center = box.getCenter(new THREE.Vector3());

  let dist = close ? 1.5 : 20;

  camera.position.set(
    center.x + dist,
    center.y + dist * 0.35,
    center.z + dist
  );

  controls.target.copy(center);
  controls.update();
}


const loader = new THREE.GLTFLoader();

loader.load(
  modelUrl,

  function(gltf){
    const model = gltf.scene;
    scene.add(model);

    const names = new Set();
    const foundMeshes = [];

    model.traverse(function(obj){

      if(isValidName(obj.name)){
        names.add(cleanName(obj.name));
      }

      if (!obj.isMesh) return;

      const searchText = [
        obj.name,
        obj.parent && obj.parent.name
      ].filter(Boolean).join(" ").toLowerCase();

      if (targetName && searchText.includes(targetName)) {
        obj.material = new THREE.MeshStandardMaterial({
          color: 0xff0000,
          emissive: 0xff0000,
          emissiveIntensity: 1.5
        });

        foundMeshes.push(obj);
      }
    });

    if(foundMeshes.length > 0){
      const box = new THREE.Box3();
      foundMeshes.forEach(m => box.expandByObject(m));
      fitToBox(box, true);
    } else {
      const box = new THREE.Box3().setFromObject(model);
      fitToBox(box, false);
    }

    const list = Array.from(names).slice(0, 80).join("\n");

    if (targetName) {
      info.textContent =
        (foundMeshes.length > 0 ? "НАЙДЕНО: " : "НЕ НАЙДЕНО: ") +
        targetName +
        "\n\n" +
        list;
    } else {
      info.textContent = list;
    }
  },

  undefined,

  function(error){
    console.error(error);
    info.textContent = "Ошибка загрузки модели";
  }
);


window.addEventListener("resize", function(){
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});


function animate(){
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}
animate();
</script>

</body>
</html>
