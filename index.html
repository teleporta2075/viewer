<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Viewer</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #111;
      font-family: Arial, sans-serif;
    }
    #info {
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 10;
      color: #fff;
      background: rgba(0,0,0,0.6);
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 14px;
    }
    canvas {
      display: block;
    }
  </style>
</head>
<body>
  <div id="info">Загрузка...</div>

  <script type="module">
    import * as THREE from "https://unpkg.com/three@0.161.0/build/three.module.js";
    import { OrbitControls } from "https://unpkg.com/three@0.161.0/examples/jsm/controls/OrbitControls.js";
    import { GLTFLoader } from "https://unpkg.com/three@0.161.0/examples/jsm/loaders/GLTFLoader.js";

    const info = document.getElementById("info");
    const params = new URLSearchParams(window.location.search);

    const modelParam = params.get("model") || "model.glb";
    const partParam = params.get("part") || "";

    const modelUrl = new URL(modelParam, window.location.href).href;

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x1a1a1a);

    const camera = new THREE.PerspectiveCamera(
      60,
      window.innerWidth / window.innerHeight,
      0.1,
      5000
    );
    camera.position.set(3, 3, 5);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;

    const hemi = new THREE.HemisphereLight(0xffffff, 0x444444, 1.5);
    scene.add(hemi);

    const dir = new THREE.DirectionalLight(0xffffff, 1.2);
    dir.position.set(10, 10, 10);
    scene.add(dir);

    const grid = new THREE.GridHelper(20, 20);
    scene.add(grid);

    const loader = new GLTFLoader();

    function fitObject(object) {
      const box = new THREE.Box3().setFromObject(object);
      const size = box.getSize(new THREE.Vector3());
      const center = box.getCenter(new THREE.Vector3());

      const maxDim = Math.max(size.x, size.y, size.z);
      const fov = camera.fov * Math.PI / 180;
      let distance = maxDim / (2 * Math.tan(fov / 2));
      distance *= 1.8;

      camera.position.set(center.x + distance, center.y + distance * 0.6, center.z + distance);
      controls.target.copy(center);
      controls.update();
    }

    loader.load(
      modelUrl,
      (gltf) => {
        const model = gltf.scene;
        scene.add(model);

        let found = null;

        if (partParam) {
          model.traverse((obj) => {
            if (obj.name && obj.name.toLowerCase().includes(partParam.toLowerCase())) {
              found = obj;
            }
          });
        }

        if (found) {
          found.traverse((obj) => {
            if (obj.isMesh) {
              obj.material = new THREE.MeshStandardMaterial({ color: 0xff3333 });
            }
          });
          fitObject(found);
          info.textContent = "Модель загружена. Деталь найдена: " + found.name;
        } else {
          fitObject(model);
          info.textContent = partParam
            ? "Модель загружена. Деталь не найдена."
            : "Модель загружена.";
        }
      },
      undefined,
      (error) => {
        console.error(error);
        info.textContent = "Ошибка загрузки модели: " + modelUrl;
      }
    );

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      renderer.render(scene, camera);
    }
    animate();
  </script>
</body>
</html>
