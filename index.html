<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Viewer</title>
  <style>
    body { margin:0; overflow:hidden; background:#ffffff; }
    #info {
      position:absolute;
      top:10px;
      left:10px;
      color:white;
      background:rgba(0,0,0,0.65);
      padding:8px 10px;
      font-family:Arial, sans-serif;
      font-size:13px;
      border-radius:8px;
      z-index:10;
    }
  </style>
</head>

<body>

<div id="info">Загрузка...</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>

const info = document.getElementById("info");

const params = new URLSearchParams(window.location.search);
const modelUrl = params.get("model") || "model.glb";
const targetName = (params.get("name") || "").toLowerCase().trim();

const scene = new THREE.Scene();
scene.background = new THREE.Color(0xffffff);

const camera = new THREE.PerspectiveCamera(
  60,
  window.innerWidth / window.innerHeight,
  0.1,
  5000
);
camera.position.set(4, 4, 6);

const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
document.body.appendChild(renderer.domElement);

const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;


// 🔥 СВЕТ (яркий)
scene.add(new THREE.AmbientLight(0xffffff, 1.4));

const light1 = new THREE.DirectionalLight(0xffffff, 2.0);
light1.position.set(10, 10, 10);
scene.add(light1);

const light2 = new THREE.DirectionalLight(0xffffff, 1.5);
light2.position.set(-10, 5, -10);
scene.add(light2);


// 🔧 подгон камеры
function fitModel(model){
  const box = new THREE.Box3().setFromObject(model);
  const size = box.getSize(new THREE.Vector3());
  const center = box.getCenter(new THREE.Vector3());

  const maxDim = Math.max(size.x, size.y, size.z);
  const dist = maxDim * 1.8;

  camera.position.set(center.x + dist, center.y + dist, center.z + dist);
  controls.target.copy(center);
  controls.update();
}


// 📦 загрузка
const loader = new THREE.GLTFLoader();

loader.load(
  modelUrl,

  function(gltf){
    const model = gltf.scene;
    scene.add(model);

    let found = false;

    model.traverse(function(obj){
      if (!obj.isMesh) return;

      // 🔴 подсветка по имени
      if (targetName && obj.name.toLowerCase().includes(targetName)) {
        obj.material = new THREE.MeshStandardMaterial({
          color: 0xff0000,
          emissive: 0x550000
        });
        found = true;
      }
    });

    fitModel(model);

    if (targetName) {
      info.textContent = found ? "Найдено: " + targetName : "Не найдено: " + targetName;
    } else {
      info.style.display = "none";
    }
  },

  undefined,

  function(error){
    console.error(error);
    info.textContent = "Ошибка загрузки модели";
  }
);


// 🔄 ресайз
window.addEventListener("resize", function(){
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});


// 🎬 анимация
function animate(){
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}
animate();

</script>

</body>
</html>
