<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Viewer</title>

  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #111;
      font-family: Arial, sans-serif;
    }

    #info {
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 10;
      color: #fff;
      background: rgba(0,0,0,0.7);
      padding: 10px;
      border-radius: 8px;
      font-size: 12px;
      max-width: 500px;
      white-space: pre-wrap;
    }
  </style>
</head>

<body>
<div id="info">Загрузка...</div>

<script type="module">
import * as THREE from "https://unpkg.com/three@0.161.0/build/three.module.js";
import { OrbitControls } from "https://unpkg.com/three@0.161.0/examples/jsm/controls/OrbitControls.js";
import { GLTFLoader } from "https://unpkg.com/three@0.161.0/examples/jsm/loaders/GLTFLoader.js";

const info = document.getElementById("info");

const params = new URLSearchParams(window.location.search);

const modelUrl = params.get("model") || "model.glb";
const targetNameRaw = params.get("name") || "";

function norm(s){
  return String(s || "").toLowerCase().trim();
}

const targetName = norm(targetNameRaw);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a1a);

const camera = new THREE.PerspectiveCamera(60, innerWidth / innerHeight, 0.1, 5000);
camera.position.set(3,3,5);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;

scene.add(new THREE.HemisphereLight(0xffffff, 0x444444, 1.4));

const dir = new THREE.DirectionalLight(0xffffff, 1.2);
dir.position.set(10,10,10);
scene.add(dir);

const loader = new GLTFLoader();

function fitBox(box){
  const size = box.getSize(new THREE.Vector3());
  const center = box.getCenter(new THREE.Vector3());

  const maxDim = Math.max(size.x, size.y, size.z) || 1;
  const distance = maxDim * 2;

  camera.position.set(center.x + distance, center.y + distance, center.z + distance);
  controls.target.copy(center);
  controls.update();
}

loader.load(
  modelUrl,

  (gltf)=>{
    const model = gltf.scene;
    scene.add(model);

    console.log("MODEL LOADED");

    // 🔥 собираем ВСЕ имена
    const allNames = [];

    model.traverse(obj=>{
      if(obj.name){
        allNames.push(obj.name);
      }
    });

    // 👉 всегда показываем список
    info.textContent =
      "Всего объектов: " + allNames.length + "\n\n" +
      "Имена:\n" +
      allNames.slice(0, 50).join("\n") +
      (allNames.length > 50 ? "\n..." : "");

    // 👉 если передано имя — ищем
    if(targetName){

      let found = false;

      model.traverse(obj=>{
        if(!obj.isMesh) return;

        const n = norm(obj.name);

        if(n.includes(targetName)){
          obj.material = new THREE.MeshStandardMaterial({
            color: 0xff0000,
            emissive: 0x550000
          });
          found = true;
        }
      });

      if(found){
        info.textContent =
          "НАЙДЕНО: " + targetNameRaw + "\n\n" +
          "Всего объектов: " + allNames.length;
      } else {
        info.textContent =
          "НЕ НАЙДЕНО: " + targetNameRaw + "\n\n" +
          "Примеры имен:\n" +
          allNames.slice(0, 30).join("\n");
      }
    }

    const box = new THREE.Box3().setFromObject(model);
    fitBox(box);
  },

  undefined,

  (error)=>{
    console.error(error);
    info.textContent = "Ошибка загрузки модели";
  }
);

window.addEventListener("resize", ()=>{
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

function animate(){
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}
animate();

</script>

</body>
</html>
