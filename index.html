<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 20px;
        background: #f5f5f5;
        color: #222;
      }

      .card {
        max-width: 520px;
        margin: 0 auto;
        background: #fff;
        border-radius: 14px;
        padding: 20px;
        box-shadow: 0 4px 18px rgba(0,0,0,0.08);
      }

      h2 {
        margin-top: 0;
        margin-bottom: 16px;
        font-size: 22px;
      }

      .row {
        margin-bottom: 10px;
        line-height: 1.5;
        word-break: break-word;
      }

      .label {
        font-weight: bold;
      }

      .block {
        margin-top: 18px;
        padding-top: 18px;
        border-top: 1px solid #e5e5e5;
      }

      input[type="text"],
      input[type="password"] {
        width: 100%;
        box-sizing: border-box;
        padding: 12px;
        margin-top: 6px;
        margin-bottom: 12px;
        border: 1px solid #ccc;
        border-radius: 8px;
        font-size: 16px;
      }

      button {
        width: 100%;
        padding: 13px;
        margin-top: 8px;
        border: none;
        border-radius: 8px;
        font-size: 16px;
        cursor: pointer;
      }

      .btn-load {
        background: #1f7a1f;
        color: white;
      }

      .btn-unload {
        background: #b22222;
        color: white;
      }

      .btn-view {
        background: #005bbb;
        color: white;
      }

      .status {
        margin-top: 16px;
        padding: 12px;
        background: #f0f4ff;
        border-radius: 8px;
        min-height: 24px;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h2>Сканирование короба</h2>

      <div class="row"><span class="label">Стенд:</span> <?= BOX_STAND ?></div>
      <div class="row"><span class="label">ID:</span> <?= BOX_ID ?></div>
      <div class="row"><span class="label">Тип:</span> <?= BOX_TYPE ?></div>
      <div class="row"><span class="label">Наименование:</span> <?= BOX_NAME ?></div>
      <div class="row"><span class="label">Лист учёта:</span> <?= BOX_LOGSHEET ?></div>

      <div class="block">
        <button class="btn-view" onclick="showPart()">Показать деталь</button>
      </div>

      <div class="block">
        <div class="row">
          <span class="label">Сотрудник</span>
          <input type="text" id="workerName" placeholder="Введите имя">
        </div>

        <div class="row">
          <span class="label">Пароль</span>
          <input type="password" id="workerPass" placeholder="Введите пароль">
        </div>

        <button class="btn-load" onclick="saveLoad()">Погрузка</button>
        <button class="btn-unload" onclick="saveUnload()">Разгрузка</button>
      </div>

      <div id="status" class="status"></div>
    </div>

    <script>
      const BOX_STAND = <?= JSON.stringify(BOX_STAND) ?>;
      const BOX_ID = <?= JSON.stringify(BOX_ID) ?>;
      const BOX_TYPE = <?= JSON.stringify(BOX_TYPE) ?>;
      const BOX_NAME = <?= JSON.stringify(BOX_NAME) ?>;
      const BOX_LOGSHEET = <?= JSON.stringify(BOX_LOGSHEET) ?>;

      function setStatus(text) {
        document.getElementById("status").textContent = text;
      }

      function showPart() {
        const url =
          "https://teleporta2075.github.io/viewer/" +
          "?model=https://teleporta2075.github.io/viewer/model.glb" +
          "&name=" + encodeURIComponent(BOX_NAME);

        window.open(url, "_blank");
      }

      function getUserData() {
        const name = document.getElementById("workerName").value.trim();
        const pass = document.getElementById("workerPass").value.trim();

        if (!name || !pass) {
          setStatus("Введите имя и пароль");
          return null;
        }

        return { name, pass };
      }

      function saveLoad() {
        const user = getUserData();
        if (!user) return;

        setStatus("Проверка пользователя...");

        google.script.run
          .withSuccessHandler(function(ok) {
            if (!ok) {
              setStatus("Неверное имя или пароль");
              return;
            }

            setStatus("Запись погрузки...");

            google.script.run
              .withSuccessHandler(function(msg) {
                setStatus(msg);
              })
              .withFailureHandler(function(err) {
                setStatus("Ошибка: " + err.message);
              })
              .saveAction(
                BOX_STAND,
                BOX_ID,
                BOX_TYPE,
                BOX_NAME,
                user.name,
                "load",
                BOX_LOGSHEET
              );
          })
          .withFailureHandler(function(err) {
            setStatus("Ошибка: " + err.message);
          })
          .checkUser(user.name, user.pass);
      }

      function saveUnload() {
        const user = getUserData();
        if (!user) return;

        setStatus("Проверка пользователя...");

        google.script.run
          .withSuccessHandler(function(ok) {
            if (!ok) {
              setStatus("Неверное имя или пароль");
              return;
            }

            setStatus("Запись разгрузки...");

            google.script.run
              .withSuccessHandler(function(msg) {
                setStatus(msg);
              })
              .withFailureHandler(function(err) {
                setStatus("Ошибка: " + err.message);
              })
              .saveAction(
                BOX_STAND,
                BOX_ID,
                BOX_TYPE,
                BOX_NAME,
                user.name,
                "unload",
                BOX_LOGSHEET
              );
          })
          .withFailureHandler(function(err) {
            setStatus("Ошибка: " + err.message);
          })
          .checkUser(user.name, user.pass);
      }
    </script>
  </body>
</html>
