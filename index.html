<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Viewer</title>
  <style>
    body { margin:0; overflow:hidden; background:#111; }
    #info {
      position:absolute;
      top:10px;
      left:10px;
      color:white;
      background:rgba(0,0,0,0.7);
      padding:10px;
      font-size:12px;
      max-width:400px;
    }
  </style>
</head>

<body>

<div id="info">Загрузка...</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>

const info = document.getElementById("info");

const params = new URLSearchParams(window.location.search);
const modelUrl = params.get("model") || "model.glb";
const targetName = (params.get("name") || "").toLowerCase();

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x222222);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 5000);
camera.position.set(3,3,5);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

const controls = new THREE.OrbitControls(camera, renderer.domElement);

scene.add(new THREE.HemisphereLight(0xffffff, 0x444444, 1.5));

const loader = new THREE.GLTFLoader();

loader.load(modelUrl, (gltf)=>{

  const model = gltf.scene;
  scene.add(model);

  let names = [];

  model.traverse(obj=>{
    if(obj.name) names.push(obj.name);

    if(obj.isMesh && targetName){
      if(obj.name.toLowerCase().includes(targetName)){
        obj.material = new THREE.MeshStandardMaterial({color:0xff0000});
      }
    }
  });

  info.textContent =
    "Объектов: " + names.length + "\n\n" +
    names.slice(0,40).join("\n");

}, undefined, ()=>{
  info.textContent = "Ошибка загрузки";
});

function animate(){
  requestAnimationFrame(animate);
  renderer.render(scene, camera);
}
animate();

</script>

</body>
</html>
