<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Viewer</title>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: #ffffff;
    }

    #info {
      position: absolute;
      top: 10px;
      left: 10px;
      color: white;
      background: rgba(0,0,0,0.70);
      padding: 10px 12px;
      font-family: Arial, sans-serif;
      font-size: 15px;
      border-radius: 8px;
      z-index: 10;
      max-width: 480px;
      max-height: 80vh;
      overflow: auto;
      white-space: pre-wrap;
    }
  </style>
</head>

<body>

<div id="info">Загрузка...</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>
const info = document.getElementById("info");

const params = new URLSearchParams(window.location.search);

let modelUrl = params.get("model");
const targetNameRaw = params.get("name") || "";
const standName = params.get("stand") || "Модель";

// Для поиска: сравниваем мягко, но НЕ портим отображаемые имена
const targetName = normalizeName(targetNameRaw);

if (!modelUrl) {
  info.textContent = "Ошибка: не передан параметр model";
  throw new Error("model parameter is missing");
}

if (!modelUrl.startsWith("http")) {
  modelUrl = "https://teleporta2075.github.io/viewer/" + modelUrl;
}

modelUrl += (modelUrl.includes("?") ? "&" : "?") + "v=" + Date.now();

const scene = new THREE.Scene();
scene.background = new THREE.Color(0xffffff);

const camera = new THREE.PerspectiveCamera(
  60,
  window.innerWidth / window.innerHeight,
  0.1,
  5000
);

camera.position.set(4, 4, 6);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
document.body.appendChild(renderer.domElement);

const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.enableZoom = true;
controls.enablePan = true;

scene.add(new THREE.AmbientLight(0xffffff, 1.6));

const light1 = new THREE.DirectionalLight(0xffffff, 2.2);
light1.position.set(10, 10, 10);
scene.add(light1);

const light2 = new THREE.DirectionalLight(0xffffff, 1.5);
light2.position.set(-10, 5, -10);
scene.add(light2);

// Нормализация только для ПОИСКА
// Пробелы и нижние подчёркивания считаем одинаковыми
function normalizeName(value) {
  return String(value || "")
    .toLowerCase()
    .replace(/_/g, " ")
    .replace(/\s+/g, " ")
    .trim();
}

// Для ОТОБРАЖЕНИЯ имя не ломаем
function displayName(name) {
  return String(name || "").trim();
}

function isBadName(name) {
  const n = String(name || "").toLowerCase().trim();

  return (
    !n ||
    n === "scene" ||
    n === "mesh" ||
    n === "node" ||
    n === "geometry" ||
    n === "geom3d" ||
    n.includes("geom3d") ||
    n.includes("geometry")
  );
}

function fitModel(model) {
  const box = new THREE.Box3().setFromObject(model);
  const size = box.getSize(new THREE.Vector3());
  const center = box.getCenter(new THREE.Vector3());

  const maxDim = Math.max(size.x, size.y, size.z);
  const dist = maxDim * 0.2;

  camera.position.set(center.x + dist, center.y + dist, center.z + dist);
  controls.target.copy(center);
  controls.update();
}

const loader = new THREE.GLTFLoader();

loader.load(
  modelUrl,

  function(gltf) {
    const model = gltf.scene;
    scene.add(model);

    let found = false;
    const names = new Set();

    model.traverse(function(obj) {
      const candidates = [
        obj.name,
        obj.parent && obj.parent.name,
        obj.parent && obj.parent.parent && obj.parent.parent.name,
        obj.material && obj.material.name,
        obj.geometry && obj.geometry.name
      ];

      candidates.forEach(function(n) {
        if (!n) return;
        if (isBadName(n)) return;

        const shown = displayName(n);

        if (shown) {
          names.add(shown);
        }
      });

      if (!obj.isMesh) return;

      const searchText = normalizeName(
        candidates
          .filter(Boolean)
          .join(" ")
      );

      if (targetName && searchText.includes(targetName)) {
        obj.material = new THREE.MeshStandardMaterial({
          color: 0xff0000,
          emissive: 0xff0000,
          emissiveIntensity: 1.5,
          roughness: 0.3,
          metalness: 0.0,
          side: THREE.DoubleSide
        });

        found = true;
      }
    });

    fitModel(model);

    const list = Array.from(names).slice(0, 100).join("\n");

    if (targetNameRaw) {
      info.textContent =
        "СТЕНД: " + standName +
        "\n\n" +
        (found ? "НАЙДЕНО: " : "НЕ НАЙДЕНО: ") + targetNameRaw +
        "\n\nИмена объектов:\n" + list;
    } else {
      info.textContent =
        "СТЕНД: " + standName +
        "\n\nИмена объектов:\n" + list;
    }
  },

  undefined,

  function(error) {
    console.error(error);
    info.textContent = "Ошибка загрузки модели:\n" + modelUrl;
  }
);

window.addEventListener("resize", function() {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}

animate();
</script>

</body>
</html>
